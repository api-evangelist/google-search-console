specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Google Search Console
providerId: google-search-console
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Analytics
  - Google
  - Search
  - SEO
  - Webmaster Tools
description: The Google Search Console API (including Search Analytics, URL Inspection, and the Indexing
  API) is offered free of charge by Google as a webmaster tool. There are no paid tiers or per-call charges;
  usage is governed by per-site, per-user, and per-project quotas published in the Google Search Console
  API limits documentation.
sources:
  - https://developers.google.com/webmaster-tools/limits
  - https://developers.google.com/webmaster-tools/v1/searchanalytics/query
plans:
  - id: google-search-console-free
    name: Free
    type: freemium
    description: The Google Search Console API is fully free for verified site owners. All endpoints —
      Search Analytics, Sitemaps, URL Inspection, and Indexing API — are subject to documented usage
      quotas with no monetary charge.
    entries:
      - label: Search Analytics — per-site queries per minute
        name: search_analytics_qpm_per_site
        type: quota
        metric: requests_per_minute
        limit: 1200
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Search Analytics — per-user queries per minute
        name: search_analytics_qpm_per_user
        type: quota
        metric: requests_per_minute
        limit: 1200
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: true
      - label: Search Analytics — per-project queries per day
        name: search_analytics_qpd_per_project
        type: quota
        metric: requests_per_day
        limit: 30000000
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: URL Inspection — per-site queries per day
        name: url_inspection_qpd_per_site
        type: quota
        metric: requests_per_day
        limit: 2000
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: URL Inspection — per-site queries per minute
        name: url_inspection_qpm_per_site
        type: quota
        metric: requests_per_minute
        limit: 600
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: All other resources — per-user QPS
        name: other_qps_per_user
        type: quota
        metric: requests_per_second
        limit: 20
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: true
      - label: All other resources — per-project QPD
        name: other_qpd_per_project
        type: quota
        metric: requests_per_day
        limit: 100000000
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Google Search Console API
      - name: Google Search Console URL Testing Tools API
      - name: Google Indexing API
      - name: No charge for API usage
      - name: Quotas raised case-by-case via Google support
maintainers:
