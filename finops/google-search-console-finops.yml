specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Google Search Console
providerId: google-search-console
publisherName: Google LLC
serviceCategory: SEO / Search Tools
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - SEO
  - Search
  - Webmaster Tools
description: 'FOCUS-aligned FinOps for the Google Search Console API: free-of-charge service whose FinOps
  cost is human / pipeline cost rather than per-call billing. Meters track quota consumption rather than
  invoice line items.'
sources:
  - https://developers.google.com/webmaster-tools/limits
billingModel:
  pricingCategory: Free
  billingFrequency: On-Demand
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Google Search Console
  ServiceCategory: SEO / Search Tools
  ProviderName: Google
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: search_analytics_queries
    description: Search Analytics queries against per-site / per-user / per-project quotas
    unit: request
    aggregation: sum
    dimensions:
      - site
      - user
      - project
  - name: url_inspection_queries
    description: URL Inspection / index inspection queries against per-site / per-project quotas
    unit: request
    aggregation: sum
    dimensions:
      - site
      - project
  - name: indexing_api_calls
    description: Calls to the Indexing API
    unit: request
    aggregation: sum
    dimensions:
      - project
  - name: sitemap_submissions
    description: Sitemap submission and management calls
    unit: request
    aggregation: sum
    dimensions:
      - site
principles:
  - name: Visibility
    description: Track API quota consumption in the Google Cloud Console quota tab; export usage to
      logging for trend analysis even though no charges accrue.
  - name: Allocation
    description: Use distinct Google Cloud projects per consuming team or workload so quota usage and
      eventual rate-limit incidents map to owners.
  - name: Optimization
    description: Cache Search Analytics responses, batch URL inspection calls, and stagger Indexing
      API submissions across the day to avoid hitting per-minute / per-day caps.
  - name: Accountability
    description: Designate an SEO / data-platform owner for quota raise requests and monitor 429 rates
      so consumers throttle themselves before quota exhaustion.
maintainers:
