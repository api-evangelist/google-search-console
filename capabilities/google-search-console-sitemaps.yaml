naftiko: 1.0.0-alpha2
info:
  label: Google Search Console API — Sitemaps
  description: 'Google Search Console API — Sitemaps. 4 operations. Lead operation: Google Search Console List Sitemaps. Self-contained
    Naftiko capability covering one Google Search Console business surface.'
  tags:
  - Google Search Console
  - Sitemaps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_SEARCH_CONSOLE_API_KEY: GOOGLE_SEARCH_CONSOLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: google-search-console-sitemaps
    baseUri: https://searchconsole.googleapis.com
    description: Google Search Console API — Sitemaps business capability. Self-contained, no shared references.
    resources:
    - name: webmasters-v3-sites-siteUrl-sitemaps
      path: /webmasters/v3/sites/{siteUrl}/sitemaps
      operations:
      - name: listsitemaps
        method: GET
        description: Google Search Console List Sitemaps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sitemapIndex
          in: query
          type: string
          description: A URL of a sitemap index. If specified, only sitemaps that are listed in this sitemap index are returned.
    - name: webmasters-v3-sites-siteUrl-sitemaps-feedpath
      path: /webmasters/v3/sites/{siteUrl}/sitemaps/{feedpath}
      operations:
      - name: getsitemap
        method: GET
        description: Google Search Console Get Sitemap Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: submitsitemap
        method: PUT
        description: Google Search Console Submit a Sitemap
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesitemap
        method: DELETE
        description: Google Search Console Delete a Sitemap
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GOOGLE_SEARCH_CONSOLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: google-search-console-sitemaps-rest
    port: 8080
    description: REST adapter for Google Search Console API — Sitemaps. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/webmasters/v3/sites/{siteurl}/sitemaps
      name: webmasters-v3-sites-siteurl-sitemaps
      description: REST surface for webmasters-v3-sites-siteUrl-sitemaps.
      operations:
      - method: GET
        name: listsitemaps
        description: Google Search Console List Sitemaps
        call: google-search-console-sitemaps.listsitemaps
        with:
          sitemapIndex: rest.sitemapIndex
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webmasters/v3/sites/{siteurl}/sitemaps/{feedpath}
      name: webmasters-v3-sites-siteurl-sitemaps-feedpath
      description: REST surface for webmasters-v3-sites-siteUrl-sitemaps-feedpath.
      operations:
      - method: GET
        name: getsitemap
        description: Google Search Console Get Sitemap Details
        call: google-search-console-sitemaps.getsitemap
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: submitsitemap
        description: Google Search Console Submit a Sitemap
        call: google-search-console-sitemaps.submitsitemap
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesitemap
        description: Google Search Console Delete a Sitemap
        call: google-search-console-sitemaps.deletesitemap
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: google-search-console-sitemaps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Search Console API — Sitemaps. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: google-search-console-list-sitemaps
      description: Google Search Console List Sitemaps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-search-console-sitemaps.listsitemaps
      with:
        sitemapIndex: tools.sitemapIndex
      outputParameters:
      - type: object
        mapping: $.
    - name: google-search-console-get-sitemap
      description: Google Search Console Get Sitemap Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-search-console-sitemaps.getsitemap
      outputParameters:
      - type: object
        mapping: $.
    - name: google-search-console-submit-sitemap
      description: Google Search Console Submit a Sitemap
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: google-search-console-sitemaps.submitsitemap
      outputParameters:
      - type: object
        mapping: $.
    - name: google-search-console-delete-sitemap
      description: Google Search Console Delete a Sitemap
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: google-search-console-sitemaps.deletesitemap
      outputParameters:
      - type: object
        mapping: $.
