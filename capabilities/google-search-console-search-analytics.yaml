naftiko: 1.0.0-alpha2
info:
  label: Google Search Console API — Search Analytics
  description: 'Google Search Console API — Search Analytics. 1 operations. Lead operation: Google Search Console Query Search
    Analytics. Self-contained Naftiko capability covering one Google Search Console business surface.'
  tags:
  - Google Search Console
  - Search Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_SEARCH_CONSOLE_API_KEY: GOOGLE_SEARCH_CONSOLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: google-search-console-search-analytics
    baseUri: https://searchconsole.googleapis.com
    description: Google Search Console API — Search Analytics business capability. Self-contained, no shared references.
    resources:
    - name: webmasters-v3-sites-siteUrl-searchAnalytics-query
      path: /webmasters/v3/sites/{siteUrl}/searchAnalytics/query
      operations:
      - name: querysearchanalytics
        method: POST
        description: Google Search Console Query Search Analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GOOGLE_SEARCH_CONSOLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: google-search-console-search-analytics-rest
    port: 8080
    description: REST adapter for Google Search Console API — Search Analytics. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/webmasters/v3/sites/{siteurl}/searchanalytics/query
      name: webmasters-v3-sites-siteurl-searchanalytics-query
      description: REST surface for webmasters-v3-sites-siteUrl-searchAnalytics-query.
      operations:
      - method: POST
        name: querysearchanalytics
        description: Google Search Console Query Search Analytics
        call: google-search-console-search-analytics.querysearchanalytics
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: google-search-console-search-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Search Console API — Search Analytics. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: google-search-console-query-search
      description: Google Search Console Query Search Analytics
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: google-search-console-search-analytics.querysearchanalytics
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
